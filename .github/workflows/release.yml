name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: tincta

jobs:
  build-macos:
    name: Build macOS (Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: macos-aarch64-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Build
        run: cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf tincta-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz ${{ env.BINARY_NAME }}
          mv tincta-*.tar.gz ${{ github.workspace }}/
      - uses: actions/upload-artifact@v4
        with:
          name: tincta-macos-aarch64
          path: tincta-*.tar.gz

  build-linux:
    name: Build Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: linux-x86_64-release-${{ hashFiles('**/Cargo.lock') }}
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libvulkan-dev
      - name: Build binary
        run: cargo build --release
      - name: Package tarball
        run: |
          cd target/release
          tar czf tincta-${{ github.ref_name }}-x86_64-linux.tar.gz ${{ env.BINARY_NAME }}
          mv tincta-*.tar.gz ${{ github.workspace }}/
      - name: Build DEB
        run: |
          cargo install cargo-deb
          cargo deb
          cp target/debian/*.deb ${{ github.workspace }}/
      - uses: actions/upload-artifact@v4
        with:
          name: tincta-linux
          path: |
            tincta-*.tar.gz
            *.deb

  build-snap:
    name: Build & Publish Snap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install snap build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxkbcommon-dev libvulkan-dev
      - uses: snapcore/action-build@v1
        id: build-snap
        with:
          snapcraft-args: --destructive-mode
      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: ${{ steps.build-snap.outputs.snap }}
          release: stable

  release:
    name: Create GitHub Release
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tincta-*.tar.gz
            *.deb
          generate_release_notes: true
          draft: false
