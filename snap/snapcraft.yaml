name: tincta
version: '0.5.0'
summary: A fast, stable, cross-platform text editor
description: |
  Tincta is a fast, stable text editor with syntax highlighting for 60+
  languages, a file sidebar, search/replace with regex, and full i18n support
  (English and French). Compatible with Ubuntu, Debian, and other Linux distros.

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64

parts:
  tincta:
    plugin: rust
    source: .
    build-packages:
      - libgtk-3-dev
      - libxkbcommon-dev
      - libvulkan-dev
    stage-packages:
      - libx11-6
      - libxext6
      - libxcursor1
      - libxi6
      - libxrandr2
      - libxkbcommon0
      - libxkbcommon-x11-0
      - libgl1
      - libegl1
      - libvulkan1
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - mesa-vulkan-drivers
      - libgl1-mesa-dri
      - libegl-mesa0
      - libosmesa6
      - xkb-data
      - fonts-ubuntu
      - fonts-dejavu-core
      - libx11-data

  desktop-file:
    plugin: dump
    source: snap/gui
    organize:
      tincta.desktop: usr/share/applications/tincta.desktop
      tincta.png: usr/share/icons/hicolor/256x256/apps/tincta.png

layout:
  /usr/share/fonts:
    bind: $SNAP/usr/share/fonts

apps:
  tincta:
    command: bin/tincta
    desktop: usr/share/applications/tincta.desktop
    environment:
      WINIT_UNIX_BACKEND: x11
      XKB_CONFIG_ROOT: $SNAP/usr/share/X11/xkb
      __EGL_VENDOR_LIBRARY_DIRS: $SNAP/usr/share/glvnd/egl_vendor.d
      LIBGL_ALWAYS_SOFTWARE: "1"
      GALLIUM_DRIVER: llvmpipe
      LIBGL_DRIVERS_PATH: $SNAP/usr/lib/x86_64-linux-gnu/dri
      MESA_LOADER_DRIVER_OVERRIDE: swrast
      XLOCALEDIR: $SNAP/usr/share/X11/locale
    plugs:
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl
