name: tincta
version: '0.1.0'
summary: A fast, stable, cross-platform text editor
description: |
  Tincta is a fast, stable text editor with syntax highlighting for 60+
  languages, a file sidebar, search/replace with regex, and full i18n support
  (English and French). Compatible with Ubuntu, Debian, and other Linux distros.

grade: stable
confinement: strict
base: core22

architectures:
  - build-on: amd64

parts:
  tincta:
    plugin: rust
    source: .
    build-packages:
      - libgtk-3-dev
      - libxkbcommon-dev
      - libvulkan-dev
    stage-packages:
      - libgtk-3-0
      - libxkbcommon0
      - libxcb1
      - libxcb-render0
      - libxcb-shape0
      - libxcb-xfixes0
      - libx11-6
      - libxrandr2
      - libxi6
      - libxcursor1
      - libvulkan1
      - libgl1
      - libegl1
      - mesa-vulkan-drivers

  desktop-file:
    plugin: dump
    source: snap/gui
    organize:
      tincta.desktop: usr/share/applications/tincta.desktop
      tincta.png: usr/share/icons/hicolor/256x256/apps/tincta.png

apps:
  tincta:
    command: bin/tincta
    desktop: usr/share/applications/tincta.desktop
    environment:
      WINIT_UNIX_BACKEND: x11
    plugs:
      - home
      - removable-media
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl
      - hardware-observe
